<!DOCTYPE html>
<html>
<head>
  <title>FCM Simple Test</title>
</head>
<body>
  <h2>Firebase Cloud Messaging Test</h2>
  <button onclick="generateToken()">Generate FCM Token</button>

  <p><strong>Token:</strong></p>
  <textarea id="token" rows="5" cols="80"></textarea>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCyT2qcj1j05PXgVgZnwNkKto_FgAR1VFQ",
  authDomain: "test-notification-e6d9a.firebaseapp.com",
  projectId: "test-notification-e6d9a",
  storageBucket: "test-notification-e6d9a.firebasestorage.app",
  messagingSenderId: "352033078609",
  appId: "1:352033078609:web:f023d814431a2afac66770",
  measurementId: "G-ZVX9TXT5R5"
  };

  const app = initializeApp(firebaseConfig);
  const messaging = getMessaging(app);

  let swRegistration = null;

  // Wait for service worker to be ready
  async function registerServiceWorker() {
    if ("serviceWorker" in navigator) {
      swRegistration = await navigator.serviceWorker.register(
        "./firebase-messaging-sw.js"
      );
      await navigator.serviceWorker.ready; // 🔥 THIS IS IMPORTANT
      console.log("Service Worker Ready");
    }
  }

  await registerServiceWorker();

  window.generateToken = async function () {
    const permission = await Notification.requestPermission();

    if (permission === "granted") {
      try {
        const token = await getToken(messaging, {
          vapidKey: "BCvfus6c9qhT-w64J-c1D-LbxMiHAIAxB63Jj8Db-UsJZnEsSY1WlPNzNGoKJEsuOcDPU904LEsp4HoLpmEY1NA",
          serviceWorkerRegistration: swRegistration, // 🔥 PASS IT HERE
        });

        console.log("FCM Token:", token);
        document.getElementById("token").value = token;
      } catch (err) {
        console.error("Error getting token", err);
      }
    } else {
      alert("Permission denied");
    }
  };

  onMessage(messaging, (payload) => {
    alert(payload.notification.title);
  });
</script>
</body>
</html>
